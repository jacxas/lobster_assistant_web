version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: lobster-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: lobster-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - server_db:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: lobster-bot
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./config.json:/app/config.json:ro
      - bot_session:/app/.wwebjs_auth
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  server_db:
  bot_session:
